# PHP 应用 x86 到 ARM 迁移部署默认配置
# 目标环境：openEuler 22.03 aarch64，root 用户执行

paths:
  base_dir: /opt/migration
  packages_dir: /opt/migration/packages
  work_dir: /opt/migration/work
  log_dir: /opt/migration/logs
  report_dir: /opt/migration/reports
  script_dir: /opt/migration/scripts
  runtime_dir: /opt/migration/runtime

php:
  version: 7.0.33
  # 有网时脚本会自动下载；无网时请手工上传到该路径
  source_package: /opt/migration/packages/php-7.0.33.tar.gz
  # 版本化安装目录；若已有正确版本则跳过安装，非空且版本不匹配则自动备份
  install_prefix: /opt/php_7.0.33
  create_symlink: true
  symlink: /opt/php
  fpm_listen: 127.0.0.1:9000
  service_name: php-fpm-7.0.33.service
  allow_configure_fallback: true

nginx:
  listen_port: 80
  port_candidates: [80, 8080, 8081, 8082]
  config_path: /etc/nginx/conf.d/php_app.conf

app:
  # auto 表示从 /opt/migration/packages 中自动选择非 php-7.0.33 的 .tar.gz/.tgz/.zip 应用包
  package: auto
  deploy_dir: /opt/php-app
  # auto 表示自动识别 public/web/www/htdocs，否则使用应用根目录
  web_root: auto

scan:
  enabled: true
  max_file_size: 1048576

verify:
  # 默认严格按 HTTP 200 判定成功；如果应用首页会跳转登录页，可改成 true 接受 301/302
  accept_redirect: false

runtime_pack:
  enabled: false
